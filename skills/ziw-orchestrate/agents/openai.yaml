interface:
  display_name: "Orchestrate"
  short_description: "Orchestrate tracked work"
  default_prompt: "Use $ziw-orchestrate to orchestrate a specific ticket set, tracker filter, project, delivery scope, or Linear Backlog clear run by reasoning over tracker, PR, check, review, worker, config, and risk evidence; selecting startable issues with explicit scope boundaries; launching implementation workers with non-goals; replying directly to assigned agents; requesting Agent Review when review evidence is actually needed; managing PR state including stuck draft PRs; applying or clearing merge-ready human-merge PR labels only with current review evidence; and stopping the recurring loop when the scoped queue is completely blocked."
policy:
  allow_implicit_invocation: false
