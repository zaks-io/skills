interface:
  display_name: "Implement"
  short_description: "Implement, verify, and PR"
  default_prompt: "Use $ziw-implement to implement exactly this tracker issue, respect its out-of-scope boundary, run required checks, use best judgment on whether author QA adds value, create the PR, and hand off for independent review. Do not rerun review merely because a commit changed. Author QA is not independent review evidence. Do not apply or clear review-evidence labels, move the issue to `Ready to Merge`, or apply merge-ready PR labels."
policy:
  allow_implicit_invocation: false
