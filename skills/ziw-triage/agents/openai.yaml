interface:
  display_name: "Issue Triage"
  short_description: "Shape tracker tickets"
  default_prompt: "Use $ziw-triage for issue tracker triage that grooms the current project Todo backlog for Orchestrator. Read repo workflow config, run the configured workflow scripts such as tick-snapshot with the configured ready+intake states, usually --linear-states Todo,Triage, then tick-plan and linear-dag-start, inspect their output, freeze the issue set, and fix tickets: labels, status, body contract, dependencies, estimates when configured, stale readiness, and exact human or To Issues questions. Include direct blockers of Todo/Triage tickets, but do not include unrelated Backlog or Duplicate by default. Use tracker/MCP tools for targeted ticket reads and mutations, not ad hoc queue discovery or GitHub/CI/deploy exploration outside the scripts."
policy:
  allow_implicit_invocation: false
